version: '3.8'

services:
  # Nginx (Your Web Server)
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app-network

  # PHP-FPM (Processing Laravel)
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql
    networks:
      - app-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: smart_digital_services
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33060:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network

  # Frontend (Vite/Node)
  frontend:
    image: node:20-alpine
    working_dir: /app
    # Using 'npm run dev' with host flag
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173" # Changed 3000 to 5173 so your link works
    volumes:
      - ./frontend:/app
      - /app/node_modules # Anonymous volume to protect node_modules
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
